name: Callable — Recipe Release

# Release para repositórios de RECEITA do txAdmin (ex.: mriTxRecipe).
# Diferente do callable-release (resources FiveM): aqui não há build de resource
# nem fxmanifest. O fluxo é: semantic-release usando o .releaserc.json do repo
# chamador, e — só quando uma versão é de fato publicada — empacota os arquivos
# listados em .release-files.json num zip e sobe para o S3/R2, além de
# sincronizar a pasta de recipes e o manifesto.

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: '20'
      # Caminho do JSON que lista os arquivos/pastas a empacotar (chave `include`).
      release-files:
        type: string
        default: '.release-files.json'
      # Nome do zip gerado e enviado para releases/ no bucket.
      zip-name:
        type: string
        default: 'mri_Qbox.zip'
      # Pasta de recipes sincronizada para latest/recipes/ no bucket.
      recipes-dir:
        type: string
        default: 'recipes'
      # Manifesto enviado para latest/<arquivo> no bucket.
      recipes-manifest:
        type: string
        default: 'recipes.json'
      # Recipe copiada como latest/recipe.yaml (compat. legada). Vazio = pula.
      legacy-recipe:
        type: string
        default: 'recipes/base.yaml'
      # Config do Infisical (fonte central de secrets via OIDC). Nada aqui e
      # secret: o Identity ID e so um identificador — a auth exige o JWT OIDC do
      # Actions casar com a trust condition (repository_owner) da identity.
      infisical-domain:
        type: string
        default: 'https://secrets.mriqbox.com.br'
      infisical-identity:
        type: string
        default: 'efec2ffe-55d0-479d-9535-8da6b0ea4665'
      infisical-project:
        type: string
        default: 'github-releases-k1-qq'
      infisical-env:
        type: string
        default: 'prod'
      infisical-audience:
        type: string
        default: 'https://github.com/mri-Qbox-Brasil'
    secrets:
      # Agora opcionais: com o Infisical vem por OIDC. Aceitos como fallback.
      # PAT da org, usado pelo semantic-release (@semantic-release/git + github).
      GH_TOKEN:
        required: false
      AWS_ACCESS_KEY_ID:
        required: false
      AWS_SECRET_ACCESS_KEY:
        required: false
      AWS_REGION:
        required: false
      AWS_S3_BUCKET:
        required: false
      # Endpoint de S3-compatível (ex.: Cloudflare R2). Vazio = AWS S3 padrão.
      AWS_S3_ENDPOINT:
        required: false
      # Prefixo opcional dentro do bucket (com ou sem barra final).
      AWS_S3_PATH:
        required: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      # Puxa os secrets do Infisical via OIDC (fonte central). Nao-fatal: cai no
      # fallback secrets.* (padrao env.X || secrets.X) se o Infisical estiver fora.
      - name: Secrets via Infisical (OIDC)
        id: infisical
        continue-on-error: true
        uses: Infisical/secrets-action@v1.0.16
        with:
          method: oidc
          domain: ${{ inputs.infisical-domain }}
          identity-id: ${{ inputs.infisical-identity }}
          project-slug: ${{ inputs.infisical-project }}
          env-slug: ${{ inputs.infisical-env }}
          oidc-audience: ${{ inputs.infisical-audience }}

      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ env.GH_TOKEN || secrets.GH_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}

      # Usa o .releaserc.json do próprio repo chamador (não inline aqui), apenas
      # garantindo os plugins necessários no runner.
      - name: Run Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v6
        env:
          GITHUB_TOKEN: ${{ env.GH_TOKEN || secrets.GH_TOKEN }}
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/exec
            @semantic-release/git

      # ── Publicacao dos artefatos (so quando saiu versao nova) ───────────────
      # Uma tarefa por passo: se um upload falhar, o passo vermelho ja diz qual.
      # As credenciais e o destino sao resolvidos uma vez e exportados no
      # $GITHUB_ENV, para que cada upload seja um comando `aws` unico.

      - name: Configura credenciais AWS/R2
        if: steps.semantic.outputs.new_release_published == 'true'
        env:
          AWS_KEY: ${{ env.AWS_ACCESS_KEY_ID || secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET: ${{ env.AWS_SECRET_ACCESS_KEY || secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION_IN: ${{ env.AWS_REGION || secrets.AWS_REGION }}
          # Endpoint de S3-compativel (ex.: Cloudflare R2). Vazio = AWS S3 padrao.
          AWS_ENDPOINT_IN: ${{ env.AWS_S3_ENDPOINT || secrets.AWS_S3_ENDPOINT }}
        run: |
          set -euo pipefail
          {
            echo "AWS_ACCESS_KEY_ID=$AWS_KEY"
            echo "AWS_SECRET_ACCESS_KEY=$AWS_SECRET"
            echo "AWS_DEFAULT_REGION=$AWS_REGION_IN"
          } >> "$GITHUB_ENV"
          # O AWS CLI v2 (>= 2.13) le AWS_ENDPOINT_URL nativamente, o que dispensa
          # repetir --endpoint-url em cada comando. So exporta se houver valor:
          # vazio faria o CLI tentar um endpoint em branco.
          if [ -n "${AWS_ENDPOINT_IN:-}" ]; then
            echo "AWS_ENDPOINT_URL=$AWS_ENDPOINT_IN" >> "$GITHUB_ENV"
          fi

      - name: Resolve o destino no bucket
        if: steps.semantic.outputs.new_release_published == 'true'
        env:
          AWS_S3_BUCKET: ${{ env.AWS_S3_BUCKET || secrets.AWS_S3_BUCKET }}
          AWS_S3_PATH: ${{ env.AWS_S3_PATH || secrets.AWS_S3_PATH }}
        run: |
          set -euo pipefail
          S3_PATH="${AWS_S3_PATH:-}"
          # Garante a barra final quando ha prefixo, para o join simples abaixo.
          if [ -n "$S3_PATH" ] && [ "${S3_PATH%/}" = "$S3_PATH" ]; then
            S3_PATH="$S3_PATH/"
          fi
          echo "BUCKET=s3://${AWS_S3_BUCKET}/${S3_PATH}" >> "$GITHUB_ENV"

      - name: Empacota o zip da release
        if: steps.semantic.outputs.new_release_published == 'true'
        env:
          RELEASE_FILES: ${{ inputs.release-files }}
          ZIP_NAME: ${{ inputs.zip-name }}
        run: |
          set -euo pipefail
          # Lista de arquivos/pastas a incluir vem da chave `include` do JSON.
          PATHS=$(jq -r '.include | join(" ")' "$RELEASE_FILES")
          echo "Empacotando: $PATHS"
          zip -r "$ZIP_NAME" $PATHS

      - name: Envia o zip para releases/
        if: steps.semantic.outputs.new_release_published == 'true'
        env:
          ZIP_NAME: ${{ inputs.zip-name }}
        run: aws s3 cp "$ZIP_NAME" "${BUCKET}releases/$ZIP_NAME"

      - name: Sincroniza a pasta de recipes
        if: steps.semantic.outputs.new_release_published == 'true'
        env:
          RECIPES_DIR: ${{ inputs.recipes-dir }}
        run: aws s3 sync "$RECIPES_DIR/" "${BUCKET}latest/$RECIPES_DIR/"

      - name: Envia o manifesto de recipes
        if: steps.semantic.outputs.new_release_published == 'true'
        env:
          RECIPES_MANIFEST: ${{ inputs.recipes-manifest }}
        run: aws s3 cp "$RECIPES_MANIFEST" "${BUCKET}latest/$RECIPES_MANIFEST"

      # Compatibilidade legada: mantem uma copia da recipe base como recipe.yaml.
      - name: Envia a recipe legada (recipe.yaml)
        if: ${{ steps.semantic.outputs.new_release_published == 'true' && inputs.legacy-recipe != '' }}
        env:
          LEGACY_RECIPE: ${{ inputs.legacy-recipe }}
        run: aws s3 cp "$LEGACY_RECIPE" "${BUCKET}latest/recipe.yaml"

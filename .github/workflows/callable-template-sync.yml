name: Callable — Template Sync

on:
  workflow_call:
    inputs:
      source-repo:
        type: string
        default: 'mri-Qbox-Brasil/script-template'
      source-branch:
        type: string
        default: 'main'
      destination-branch:
        type: string
        default: 'main'
    secrets:
      # PAT com escopo `workflow` (classic) ou fine-grained com
      # "Workflows: Read and write". O GITHUB_TOKEN padrão NÃO serve: o GitHub
      # proíbe App tokens de criar/alterar arquivos em .github/workflows/.
      GH_TOKEN:
        required: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.destination-branch }}
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN || github.token }}

      # Abre um PR com as mudanças do template (não força push na branch).
      # Respeita o .templatesyncignore do repo de destino (raiz ou .github/).
      - name: Sync template
        uses: AndreasAugustin/actions-template-sync@v2
        with:
          source_repo_path: ${{ inputs.source-repo }}
          upstream_branch: ${{ inputs.source-branch }}
          github_token: ${{ secrets.GH_TOKEN || github.token }}
          pr_title: "chore(template): sync with template"
          pr_labels: "template-sync"
          pr_body: "Atualização automática do template base"

name: Callable — Template Sync

on:
  workflow_call:
    inputs:
      source-repo:
        type: string
        default: 'mri-Qbox-Brasil/script-template'
      source-branch:
        type: string
        default: 'main'
      destination-branch:
        type: string
        default: 'main'
      # Config do Infisical (fonte central de secrets via OIDC). Nada aqui e
      # secret: o Identity ID e so um identificador — a auth exige o JWT OIDC do
      # Actions casar com a trust condition (repository_owner) da identity.
      infisical-domain:
        type: string
        default: 'https://secrets.mriqbox.com.br'
      infisical-identity:
        type: string
        default: 'efec2ffe-55d0-479d-9535-8da6b0ea4665'
      infisical-project:
        type: string
        default: 'github-releases-k1-qq'
      infisical-env:
        type: string
        default: 'prod'
      infisical-audience:
        type: string
        default: 'https://github.com/mri-Qbox-Brasil'
    secrets:
      # PAT com escopo `workflow` (classic) ou fine-grained com
      # "Workflows: Read and write". O GITHUB_TOKEN padrão NÃO serve: o GitHub
      # proíbe App tokens de criar/alterar arquivos em .github/workflows/.
      GH_TOKEN:
        required: false

jobs:
  sync:
    # Chave do job: `vars.CI_TEMPLATE_SYNC=false` congela o template neste repo.
    # Ver a secao "Chaves liga-desliga" no README.
    if: ${{ !contains(fromJSON('["false","0","off","no"]'), vars.CI_TEMPLATE_SYNC) }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      # OIDC: emite o JWT que o Infisical troca pelos secrets. O wrapper chamador
      # do resource TAMBEM precisa de `id-token: write`.
      id-token: write

    steps:
      - name: Chaves (vars) deste repositorio
        env:
          CI_SECRETS_INFISICAL: ${{ vars.CI_SECRETS_INFISICAL }}
        run: |
          echo "CI_TEMPLATE_SYNC=<ligado: o job rodou>"
          echo "CI_SECRETS_INFISICAL=${CI_SECRETS_INFISICAL:-<vazio: ligado>}"

      # Puxa os secrets do Infisical via OIDC (fonte central). Nao-fatal: cai no
      # fallback secrets.* se o Infisical estiver fora.
      #
      # Chave: `vars.CI_SECRETS_INFISICAL=false` pula o Infisical e usa so os
      # secrets nativos do repo/org.
      - name: Secrets via Infisical (OIDC)
        id: infisical
        if: ${{ !contains(fromJSON('["false","0","off","no"]'), vars.CI_SECRETS_INFISICAL) }}
        continue-on-error: true
        uses: Infisical/secrets-action@v1.0.16
        with:
          method: oidc
          domain: ${{ inputs.infisical-domain }}
          identity-id: ${{ inputs.infisical-identity }}
          project-slug: ${{ inputs.infisical-project }}
          env-slug: ${{ inputs.infisical-env }}
          oidc-audience: ${{ inputs.infisical-audience }}

      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.destination-branch }}
          fetch-depth: 0
          token: ${{ env.GH_TOKEN || secrets.GH_TOKEN || github.token }}

      # Abre um PR com as mudanças do template (não força push na branch).
      # Respeita o .templatesyncignore do repo de destino (raiz ou .github/).
      - name: Sync template
        uses: AndreasAugustin/actions-template-sync@v2
        with:
          source_repo_path: ${{ inputs.source-repo }}
          upstream_branch: ${{ inputs.source-branch }}
          github_token: ${{ env.GH_TOKEN || secrets.GH_TOKEN || github.token }}
          pr_title: "chore(template): sync with template"
          pr_labels: "template-sync"
          pr_body: "Atualização automática do template base"

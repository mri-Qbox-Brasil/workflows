name: Publish — fivem-test-harness

# Publica o @mriqbox/fivem-test-harness no npm publico (mesmo scope do @mriqbox/ui-kit).
#
# ─── autenticacao: trusted publishing (OIDC), sem token ──────────────────────
#
# O runner prova quem e para o npm via OIDC do proprio GitHub — o npm confere que o
# request veio DESTE repo, DESTE workflow, e so entao aceita. Nao ha segredo de longa
# duracao para vazar, e um token roubado nao serve para nada porque nao existe token.
#
# Ganho de brinde: `--provenance`. O npm assina e publica a atestacao de que o pacote
# saiu deste commit, deste workflow. Quem instala pode verificar a origem.
#
# ─── nao ha token aqui, e nao pode haver ─────────────────────────────────────
#
# O npm nao deixa publicar a PRIMEIRA versao de um pacote via OIDC (o trusted publisher
# e configurado nas settings do pacote, que so existem depois do pacote existir —
# npm/cli#8544). A 0.1.0 subiu com token, uma vez, e o trusted publisher foi configurado
# em seguida. Dai em diante: OIDC, sempre.
#
# A tentativa de deixar os dois caminhos convivendo ("usa OIDC se tiver, senao o token")
# NAO FUNCIONA, e a 0.1.1 falhou provando isso: com NODE_AUTH_TOKEN definido, o npm
# autentica com ele e nem tenta o OIDC. Token presente ganha. Por isso o passo de publish
# nao tem `env:` — deixar um token ali, ate vazio, quebra o trusted publishing.
#
# Se um dia isto voltar a falhar com 404 no PUT, o suspeito numero um e alguem ter
# reintroduzido um NODE_AUTH_TOKEN.

on:
  push:
    branches: [main]
    paths:
      - "packages/fivem-test-harness/**"
      - ".github/workflows/publish-harness.yml"
  workflow_dispatch: {}

concurrency:
  group: publish-harness
  cancel-in-progress: false

jobs:
  publish:
    name: Publish no npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC: e isto que dispensa o token
    defaults:
      run:
        working-directory: packages/fivem-test-harness
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          # Trusted publishing exige Node >= 22.14 e npm >= 11.5.1.
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Garante npm >= 11.5.1 (requisito do OIDC)
        run: npm install -g npm@latest

      - name: Versoes de node/npm
        run: echo "npm $(npm --version) / node $(node --version)"

      - name: Instala as dependencias do harness
        run: npm install --no-audit --no-fund

      # O harness roda o Lua real sob wasmoon. Se ele nao carrega, nao adianta publicar.
      - name: Smoke test — o harness inicia um estado Lua?
        run: |
          node -e "
            import('./index.mjs').then(async ({ createHarness, luaValue }) => {
              const lua = await createHarness({ seed: 'OK = 1 + 1' })
              const v = await luaValue(lua, 'OK')
              if (v !== 2) { console.error('harness nao avaliou Lua:', v); process.exit(1) }
              console.log('harness OK — Lua avaliado sob wasmoon')
            }).catch(e => { console.error(e); process.exit(1) })
          "

      - name: Le nome e versao do pacote
        id: pkg
        run: |
          echo "name=$(node -p "require('./package.json').name")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Verifica se a versao ja esta publicada
        id: published
        env:
          NAME: ${{ steps.pkg.outputs.name }}
          VER: ${{ steps.pkg.outputs.version }}
        run: |
          if npm view "$NAME@$VER" version >/dev/null 2>&1; then
            echo "$NAME@$VER ja esta publicado — nada a fazer."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "$NAME@$VER ainda nao existe no registry."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publica no npm
        if: steps.published.outputs.exists == 'false'
        run: npm publish --access public --provenance
        # SEM `env: NODE_AUTH_TOKEN`. E deliberado, e custou um publish falho para
        # aprender: token presente GANHA do OIDC. Nao "convivem".
        #
        # A 0.1.1 falhou com `404 - PUT .../@mriqbox%2ffivem-test-harness` mesmo com o
        # trusted publisher ja configurado. O secret ainda estava aqui (com o valor de um
        # token ja revogado), o npm autenticou com ele em vez de tentar o OIDC, e o
        # registry devolveu 404 — que e o que ele responde para credencial invalida.
        #
        # O sinal que denunciou: a provenance FOI assinada (isso usa o OIDC do sigstore,
        # entao `id-token: write` estava certo) e mesmo assim o PUT foi recusado. Duas
        # autenticacoes diferentes, so uma quebrada.

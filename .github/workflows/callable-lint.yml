name: Callable — Lint

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: '20'
      pnpm-version:
        type: string
        default: '9'
      web-dir:
        type: string
        default: 'web'
      web-lint:
        description: 'Habilita ESLint (desabilitar em repos Lua-only)'
        type: boolean
        default: true
      lua-lint:
        description: 'Habilita luacheck (requer .luacheckrc no repo)'
        type: boolean
        default: false

jobs:
  # Cada job tem duas travas: o input do wrapper (default do template) e a chave
  # `vars.CI_LINT_*` do repositorio chamador, que vence sem precisar editar o
  # wrapper — util porque o wrapper e sobrescrito pelo template-sync.
  # Ver a secao "Chaves liga-desliga" no README.
  lint-web:
    name: Lint Web (ESLint)
    if: ${{ inputs.web-lint && !contains(fromJSON('["false","0","off","no"]'), vars.CI_LINT_WEB) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ inputs.pnpm-version }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'pnpm'
          cache-dependency-path: ${{ inputs.web-dir }}/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ${{ inputs.web-dir }}
        run: pnpm install --no-frozen-lockfile

      - name: Run ESLint
        working-directory: ${{ inputs.web-dir }}
        run: pnpm run lint

  lint-lua:
    name: Lint Lua (luacheck)
    if: ${{ inputs.lua-lint && !contains(fromJSON('["false","0","off","no"]'), vars.CI_LINT_LUA) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install luacheck
        # O pacote Debian/Ubuntu chama-se `lua-check`; o binario e que e `luacheck`.
        # `apt-get install luacheck` falha com "Unable to locate package".
        run: sudo apt-get update && sudo apt-get install -y lua-check

      - name: Run luacheck
        run: luacheck .

name: Generate Docs

on:
  push:
    branches:
      - main
    paths:
      - 'client/**'
      - 'server/**'
      - 'shared/**'
      - 'fxmanifest.lua'
      - '.github/templates/**'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install --prefer-offline --no-audit --no-fund --prefix .release

      - name: Generate docs
        run: node .release/generate-docs.js
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_PROVIDER: ${{ vars.AI_PROVIDER }}
          AI_BASE_URL: ${{ vars.AI_BASE_URL }}
          AI_MODEL: ${{ vars.AI_MODEL }}
          AI_CHUNKS: ${{ vars.AI_CHUNKS }}

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md MANUAL.md
          git diff --staged --quiet && echo "No changes." || (git commit -m "docs: regenerate documentation [skip ci]" && git push)

name: Callable — Mirror Release

# Release para o modelo "fonte privada -> espelho publico built-only".
#
# Roda no repo de FONTE PRIVADA (<resource>-source). O semantic-release calcula
# a versao pelos commits, injeta a versao no fxmanifest (placeholder __VERSION__)
# via `workflows set-version`, builda o front e empacota o resource com
# `workflows build` (exclui o fonte da UI, mantem so o output do build). Em
# seguida sincroniza o resource buildado para o repo PUBLICO (sem fonte),
# cria a release publica com o zip e notifica o Discord (opcional).
#
# Diferente do callable-release.yml (repo unico que se auto-libera): aqui o
# fonte fica no privado e o publico recebe apenas o artefato buildado.

on:
  workflow_call:
    inputs:
      public-repo:
        description: 'owner/repo do espelho publico que recebe o resource buildado'
        type: string
        required: true
      resource-name:
        description: 'Nome do resource (pasta e zip). Vazio => nome do public-repo'
        type: string
        default: ''
      # Diretorio do front (onde mora o package.json exibido na UI). Usado pelo
      # set-version (bump do fallback de versao) e pelo build. Default "web".
      web-path:
        type: string
        default: 'web'
      # Arquivo do source usado como README.md do repo publico. Normalmente
      # README.md; use MANUAL.md se o publico deve exibir o manual.
      public-readme:
        type: string
        default: 'README.md'
      node-version:
        type: string
        default: '20'
    secrets:
      # PAT da org com Contents R&W no source E no publico, e Packages Read.
      GH_TOKEN:
        required: true
      # PAT (conta pessoal) com escopo `models` para o GitHub Models. Sem ele,
      # cai no GH_TOKEN e usa as notas cruas.
      GH_MODELS_TOKEN:
        required: false
      # Webhook do canal de updates do Discord. Sem ela, o notificador so pula.
      UPDATE_DISCORD_WEBHOOK:
        required: false
      # Branding opcional do embed. Cada campo so entra se existir.
      LOGO_MRIQBOX_URL:
        required: false
      RESOURCE_MRIQBOX_URL:
        required: false
      INVITE_DISCORD_URL:
        required: false
      DOCS_MRIQBOX_URL:
        required: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      packages: read

    steps:
      # Checkout do source com o GITHUB_TOKEN nativo: ele sempre tem acesso ao
      # proprio repo (e permissao contents:write para o commit/tag de release do
      # semantic-release). O GH_TOKEN so e necessario para operar no repo
      # PUBLICO (clone/push/release), nas etapas de sync mais abaixo.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      # Diagnostico: confirma se o GH_TOKEN esta chegando via secrets: inherit.
      # Sem ele, o sync para o repo publico falha. Nao imprime o valor.
      - name: Verifica GH_TOKEN
        env:
          GH: ${{ secrets.GH_TOKEN }}
        run: |
          if [ -z "$GH" ]; then
            echo "::warning::GH_TOKEN vazio/nao entregue. O sync para o repo publico vai falhar."
            echo "GH_TOKEN: VAZIO"
          else
            echo "GH_TOKEN: presente"
          fi

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          registry-url: 'https://npm.pkg.github.com'
          scope: '@mri-qbox-brasil'

      - name: Install workflows e semantic-release
        run: |
          npm install --no-save \
            @mri-qbox-brasil/workflows \
            semantic-release \
            @semantic-release/changelog \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator \
            @semantic-release/exec \
            @semantic-release/git \
            @semantic-release/github
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Resolve resource name
        id: rn
        run: |
          NAME="${{ inputs.resource-name }}"
          if [ -z "$NAME" ]; then NAME="$(echo '${{ inputs.public-repo }}' | cut -d'/' -f2)"; fi
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      # Notificador de release para o Discord — identico ao callable-release,
      # exceto por respeitar NOTIFY_REPO para apontar o embed ao repo publico
      # (a release visivel aos usuarios). Fica inline porque a callable roda no
      # checkout do resource chamador, nao deste repositorio de workflows.
      - name: Prepara notificador de release
        run: |
          mkdir -p .release
          cat > .release/discord-release.js << 'EOF'
          'use strict';

          const webhook = process.env.DISCORD_RELEASE_WEBHOOK;
          const apiToken = process.env.GITHUB_TOKEN || process.env.GH_TOKEN;
          const modelsToken = process.env.GH_MODELS_TOKEN || apiToken;
          const model = (process.env.LLM_MODEL || '').trim() || 'openai/gpt-4o-mini';
          // Aponta o embed ao repo publico quando fornecido; senao ao repo atual.
          const repo = process.env.NOTIFY_REPO || process.env.GITHUB_REPOSITORY;
          const author = process.env.GITHUB_ACTOR || '';
          const env = (k) => (process.env[k] || '').trim();

          const version = (process.argv[2] || '').replace(/^v/, '');

          const notify = env('DISCORD_RELEASE_NOTIFY').toLowerCase();
          if (['false', '0', 'off', 'no'].includes(notify)) { console.log('[discord] DISCORD_RELEASE_NOTIFY desligado, pulando.'); process.exit(0); }
          if (!webhook) { console.log('[discord] sem DISCORD_RELEASE_WEBHOOK, pulando.'); process.exit(0); }
          if (!repo || !version) { console.log('[discord] repo/versao ausentes, pulando.'); process.exit(0); }

          const name = repo.split('/')[1];
          const tag = `v${version}`;
          const releaseUrl = `https://github.com/${repo}/releases/tag/${tag}`;
          const FIELD_MAX = 1000;

          async function ghJson(path) {
            const res = await fetch(`https://api.github.com${path}`, {
              headers: {
                Accept: 'application/vnd.github+json',
                'User-Agent': 'mri-release-notifier',
                ...(apiToken ? { Authorization: `Bearer ${apiToken}` } : {}),
              },
            });
            if (!res.ok) throw new Error(`GitHub API ${path} -> ${res.status}`);
            return res.json();
          }

          async function aiSummary(rawNotes) {
            const fallback = (rawNotes || 'Nova versao publicada.').slice(0, FIELD_MAX);
            if (!modelsToken || !rawNotes) return fallback;
            try {
              const res = await fetch('https://models.github.ai/inference/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${modelsToken}` },
                body: JSON.stringify({
                  model,
                  temperature: 0.5,
                  messages: [
                    {
                      role: 'system',
                      content:
                        'Voce e o redator de notas de versao do MRI QBOX, um conjunto de resources ' +
                        'para servidores FiveM (framework QBox). Recebe um changelog tecnico gerado ' +
                        'por conventional commits e o reescreve como um resumo curto, claro e amigavel ' +
                        'em portugues do Brasil, voltado para donos de servidor e jogadores. Regras: ' +
                        'use no maximo 5 bullets em markdown (use "- "); foque no que muda na pratica; ' +
                        'nao invente recursos que nao estao no changelog; nao inclua links, hashes de ' +
                        'commit nem nomes de autores; maximo ~800 caracteres; se nao houver mudancas ' +
                        'relevantes para o usuario, escreva uma unica linha de melhorias internas.',
                    },
                    { role: 'user', content: `Changelog tecnico da ${tag}:\n\n${rawNotes}` },
                  ],
                }),
              });
              if (!res.ok) throw new Error(`GitHub Models ${res.status}`);
              const data = await res.json();
              const text = data.choices?.[0]?.message?.content?.trim();
              if (!text) throw new Error('resposta vazia do modelo');
              console.log('[discord] descricao gerada via IA.');
              return text.slice(0, FIELD_MAX);
            } catch (e) {
              console.error('[discord] IA falhou, usando notas cruas:', e.message);
              return fallback;
            }
          }

          (async () => {
            let rawNotes = '';
            let description = '';
            try {
              const rel = await ghJson(`/repos/${repo}/releases/tags/${tag}`);
              rawNotes = rel.body || '';
            } catch (e) { console.error('[discord] nao obteve notas da release:', e.message); }
            try {
              const info = await ghJson(`/repos/${repo}`);
              description = info.description || '';
            } catch (e) { console.error('[discord] nao obteve descricao do repo:', e.message); }

            const whatsNew = await aiSummary(rawNotes);

            const fields = [{ name: 'O que ha de novo?', value: whatsNew }];
            fields.push({
              name: 'Veja todas as mudancas',
              value: `[Veja aqui](https://github.com/${repo}/commits/${tag})`,
            });
            if (env('INVITE_DISCORD_URL'))
              fields.push({ name: 'Precisa de ajuda?', value: `[Participe da comunidade](${env('INVITE_DISCORD_URL')})`, inline: true });
            if (env('DOCS_MRIQBOX_URL'))
              fields.push({ name: 'Documentacao', value: `[Acesse aqui](${env('DOCS_MRIQBOX_URL')})`, inline: true });

            const embed = {
              author: { name: 'MRI QBOX - Updates', ...(env('LOGO_MRIQBOX_URL') ? { icon_url: env('LOGO_MRIQBOX_URL') } : {}) },
              title: `[${name}] Nova versao disponivel: ${tag}`.slice(0, 256),
              url: releaseUrl,
              description: description.slice(0, 4096),
              fields,
              color: 4243543,
              footer: { text: `Realizado por: ${author}`.slice(0, 2048), ...(env('LOGO_MRIQBOX_URL') ? { icon_url: env('LOGO_MRIQBOX_URL') } : {}) },
              timestamp: new Date().toISOString(),
            };
            if (env('RESOURCE_MRIQBOX_URL')) embed.image = { url: env('RESOURCE_MRIQBOX_URL') };

            const res = await fetch(webhook, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ embeds: [embed] }),
            });
            console.log('[discord] status', res.status);
            if (!res.ok) console.error('[discord] corpo:', (await res.text()).slice(0, 500));
          })().catch((e) => { console.error('[discord] erro nao fatal:', e.message); process.exit(0); });
          EOF

      - name: Release (source privado)
        run: |
          mkdir -p .release && cat > .release/release.config.cjs << 'EOF'
          module.exports = {
            branches: ['main'],
            plugins: [
              '@semantic-release/commit-analyzer',
              '@semantic-release/release-notes-generator',
              '@semantic-release/changelog',
              ['@semantic-release/exec', {
                // set-version injeta a versao no placeholder __VERSION__ do
                // fxmanifest (nao commitado de volta) e bumpa web/package.json.
                // build empacota o resource buildado em dist/<name>.zip e cria a
                // arvore dist/<name>/ (sem fonte da UI) usada no sync publico.
                prepareCmd: "npx workflows set-version ${nextRelease.version} \"$WEB_PATH\" && npx workflows build \"$RESOURCE_NAME\" \"$WEB_PATH\"",
                // Escreve versao e notas para as etapas de sync/release publico.
                successCmd: "echo \"${nextRelease.version}\" > .VERSION && cat > .NOTES.md << '___RELEASE_NOTES_EOF___'\n${nextRelease.notes}\n___RELEASE_NOTES_EOF___"
              }],
              // Commita de volta apenas o bump do package.json do front e o
              // CHANGELOG. NUNCA inclui fxmanifest.lua: o source mantem __VERSION__.
              ['@semantic-release/git', {
                assets: [(process.env.WEB_PATH || 'web') + '/package.json', 'CHANGELOG.md'],
                message: 'chore(release): ${nextRelease.version} [skip ci]'
              }]
            ]
          };
          EOF
          npx semantic-release --extends ./.release/release.config.cjs
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GH_TOKEN }}
          WEB_PATH: ${{ inputs.web-path }}
          RESOURCE_NAME: ${{ steps.rn.outputs.name }}

      - name: Get released version
        id: meta
        run: |
          if [ -f .VERSION ]; then
            echo "VERSION=$(cat .VERSION | xargs)" >> "$GITHUB_OUTPUT"
            echo "PUBLISHED=true" >> "$GITHUB_OUTPUT"
          else
            echo "PUBLISHED=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync para o repo publico
        if: steps.meta.outputs.PUBLISHED == 'true'
        env:
          VERSION: ${{ steps.meta.outputs.VERSION }}
          RESOURCE_NAME: ${{ steps.rn.outputs.name }}
          PUBLIC_REPO: ${{ inputs.public-repo }}
          PUBLIC_README: ${{ inputs.public-readme }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git clone "https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/${PUBLIC_REPO}.git" public_repo

          # Limpa conteudo antigo (preserva .git)
          find public_repo -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +

          # Sincroniza o resource buildado (dist/<name>/ ja e so o output, sem UI)
          rsync -av "dist/${RESOURCE_NAME}/" public_repo/

          # README do repo publico vem do source (README.md ou MANUAL.md)
          if [ -f "${PUBLIC_README}" ]; then cp "${PUBLIC_README}" public_repo/README.md; fi

          cd public_repo
          git add -A
          if git diff --staged --quiet; then
            echo "Nada para sincronizar no conteudo"
          else
            git commit -m "chore(release): sync v${VERSION} [skip ci]"
            git push origin main
          fi
          git tag -f "v${VERSION}"
          git push origin "v${VERSION}" -f

      - name: Release no repo publico
        if: steps.meta.outputs.PUBLISHED == 'true'
        uses: softprops/action-gh-release@v3
        with:
          repository: ${{ inputs.public-repo }}
          tag_name: v${{ steps.meta.outputs.VERSION }}
          name: v${{ steps.meta.outputs.VERSION }}
          body_path: .NOTES.md
          files: dist/${{ steps.rn.outputs.name }}.zip
          token: ${{ secrets.GH_TOKEN }}
          make_latest: true

      - name: Notifica Discord
        if: steps.meta.outputs.PUBLISHED == 'true'
        run: node .release/discord-release.js "${{ steps.meta.outputs.VERSION }}"
        env:
          # Aponta o embed a release publica (a visivel aos usuarios).
          NOTIFY_REPO: ${{ inputs.public-repo }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN || secrets.GH_TOKEN || github.token }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          DISCORD_RELEASE_NOTIFY: ${{ vars.DISCORD_RELEASE_NOTIFY }}
          DISCORD_RELEASE_WEBHOOK: ${{ secrets.UPDATE_DISCORD_WEBHOOK }}
          LOGO_MRIQBOX_URL: ${{ secrets.LOGO_MRIQBOX_URL }}
          RESOURCE_MRIQBOX_URL: ${{ secrets.RESOURCE_MRIQBOX_URL }}
          INVITE_DISCORD_URL: ${{ secrets.INVITE_DISCORD_URL }}
          DOCS_MRIQBOX_URL: ${{ secrets.DOCS_MRIQBOX_URL }}

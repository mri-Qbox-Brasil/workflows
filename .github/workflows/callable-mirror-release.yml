name: Callable — Mirror Release

# Release para o modelo "fonte privada -> espelho publico built-only".
#
# Roda no repo de FONTE PRIVADA (<resource>-source). O semantic-release calcula
# a versao pelos commits, injeta a versao no fxmanifest (placeholder __VERSION__)
# via `workflows set-version`, builda o front e empacota o resource com
# `workflows build` (exclui o fonte da UI, mantem so o output do build). Em
# seguida sincroniza o resource buildado para o repo PUBLICO (sem fonte),
# cria a release publica com o zip e notifica o Discord (opcional).
#
# Diferente do callable-release.yml (repo unico que se auto-libera): aqui o
# fonte fica no privado e o publico recebe apenas o artefato buildado.

on:
  workflow_call:
    inputs:
      public-repo:
        description: 'owner/repo do espelho publico que recebe o resource buildado'
        type: string
        required: true
      resource-name:
        description: 'Nome do resource (pasta e zip). Vazio => nome do public-repo'
        type: string
        default: ''
      # Diretorio do front (onde mora o package.json exibido na UI). Usado pelo
      # set-version (bump do fallback de versao) e pelo build. Default "web".
      web-path:
        type: string
        default: 'web'
      # Arquivo do source usado como README.md do repo publico. Normalmente
      # README.md; use MANUAL.md se o publico deve exibir o manual.
      public-readme:
        type: string
        default: 'README.md'
      node-version:
        type: string
        default: '20'
    secrets:
      # PAT da org com Contents R&W no source E no publico, e Packages Read.
      GH_TOKEN:
        required: true
      # PAT (conta pessoal) com escopo `models` para o GitHub Models. Sem ele,
      # cai no GH_TOKEN e usa as notas cruas.
      GH_MODELS_TOKEN:
        required: false
      # Webhook do canal de updates do Discord. Sem ela, o notificador so pula.
      UPDATE_DISCORD_WEBHOOK:
        required: false
      # Branding opcional do embed. Cada campo so entra se existir.
      LOGO_MRIQBOX_URL:
        required: false
      RESOURCE_MRIQBOX_URL:
        required: false
      INVITE_DISCORD_URL:
        required: false
      DOCS_MRIQBOX_URL:
        required: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      packages: read

    steps:
      # Checkout do source com o GITHUB_TOKEN nativo: ele sempre tem acesso ao
      # proprio repo (e permissao contents:write para o commit/tag de release do
      # semantic-release). O GH_TOKEN so e necessario para operar no repo
      # PUBLICO (clone/push/release), nas etapas de sync mais abaixo.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      # Diagnostico: confirma se o GH_TOKEN esta chegando via secrets: inherit.
      # Sem ele, o sync para o repo publico falha. Nao imprime o valor.
      - name: Verifica GH_TOKEN
        env:
          GH: ${{ secrets.GH_TOKEN }}
        run: |
          if [ -z "$GH" ]; then
            echo "::warning::GH_TOKEN vazio/nao entregue. O sync para o repo publico vai falhar."
            echo "GH_TOKEN: VAZIO"
          else
            echo "GH_TOKEN: presente"
          fi

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          registry-url: 'https://npm.pkg.github.com'
          scope: '@mri-qbox-brasil'

      - name: Install workflows e semantic-release
        run: |
          npm install --no-save \
            @mri-qbox-brasil/workflows \
            semantic-release \
            @semantic-release/changelog \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator \
            @semantic-release/exec \
            @semantic-release/git \
            @semantic-release/github
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Resolve resource name
        id: rn
        run: |
          NAME="${{ inputs.resource-name }}"
          if [ -z "$NAME" ]; then NAME="$(echo '${{ inputs.public-repo }}' | cut -d'/' -f2)"; fi
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Release (source privado)
        run: |
          mkdir -p .release && cat > .release/release.config.cjs << 'EOF'
          module.exports = {
            branches: ['main'],
            plugins: [
              '@semantic-release/commit-analyzer',
              '@semantic-release/release-notes-generator',
              '@semantic-release/changelog',
              ['@semantic-release/exec', {
                // set-version injeta a versao no placeholder __VERSION__ do
                // fxmanifest (nao commitado de volta) e bumpa web/package.json.
                // build empacota o resource buildado em dist/<name>.zip e cria a
                // arvore dist/<name>/ (sem fonte da UI) usada no sync publico.
                prepareCmd: "npx workflows set-version ${nextRelease.version} \"$WEB_PATH\" && npx workflows build \"$RESOURCE_NAME\" \"$WEB_PATH\"",
                // Escreve versao e notas para as etapas de sync/release publico.
                successCmd: "echo \"${nextRelease.version}\" > .VERSION && cat > .NOTES.md << '___RELEASE_NOTES_EOF___'\n${nextRelease.notes}\n___RELEASE_NOTES_EOF___"
              }],
              // Commita de volta apenas o bump do package.json do front e o
              // CHANGELOG. NUNCA inclui fxmanifest.lua: o source mantem __VERSION__.
              ['@semantic-release/git', {
                assets: [(process.env.WEB_PATH || 'web') + '/package.json', 'CHANGELOG.md'],
                message: 'chore(release): ${nextRelease.version} [skip ci]'
              }]
            ]
          };
          EOF
          npx semantic-release --extends ./.release/release.config.cjs
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GH_TOKEN }}
          WEB_PATH: ${{ inputs.web-path }}
          RESOURCE_NAME: ${{ steps.rn.outputs.name }}

      - name: Get released version
        id: meta
        run: |
          if [ -f .VERSION ]; then
            echo "VERSION=$(cat .VERSION | xargs)" >> "$GITHUB_OUTPUT"
            echo "PUBLISHED=true" >> "$GITHUB_OUTPUT"
          else
            echo "PUBLISHED=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync para o repo publico
        if: steps.meta.outputs.PUBLISHED == 'true'
        env:
          VERSION: ${{ steps.meta.outputs.VERSION }}
          RESOURCE_NAME: ${{ steps.rn.outputs.name }}
          PUBLIC_REPO: ${{ inputs.public-repo }}
          PUBLIC_README: ${{ inputs.public-readme }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git clone "https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/${PUBLIC_REPO}.git" public_repo

          # Limpa conteudo antigo (preserva .git)
          find public_repo -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +

          # Sincroniza o resource buildado (dist/<name>/ ja e so o output, sem UI)
          rsync -av "dist/${RESOURCE_NAME}/" public_repo/

          # README do repo publico vem do source (README.md ou MANUAL.md)
          if [ -f "${PUBLIC_README}" ]; then cp "${PUBLIC_README}" public_repo/README.md; fi

          # Injeta o workflow de notificacao do Discord no espelho publico.
          # Ele roda NO PUBLICO (que pode usar secrets de org no plano Free),
          # diferente deste job (source privado). Template vem do repo workflows.
          mkdir -p public_repo/.github/workflows
          gh api repos/mri-Qbox-Brasil/workflows/contents/.release/templates/release-notify.yml \n            --jq '.content' | base64 -d > public_repo/.github/workflows/release-notify.yml

          cd public_repo
          git add -A
          if git diff --staged --quiet; then
            echo "Nada para sincronizar no conteudo"
          else
            git commit -m "chore(release): sync v${VERSION} [skip ci]"
            git push origin main
          fi
          git tag -f "v${VERSION}"
          git push origin "v${VERSION}" -f

      - name: Release no repo publico
        if: steps.meta.outputs.PUBLISHED == 'true'
        uses: softprops/action-gh-release@v3
        with:
          repository: ${{ inputs.public-repo }}
          tag_name: v${{ steps.meta.outputs.VERSION }}
          name: v${{ steps.meta.outputs.VERSION }}
          body_path: .NOTES.md
          files: dist/${{ steps.rn.outputs.name }}.zip
          token: ${{ secrets.GH_TOKEN }}
          make_latest: true

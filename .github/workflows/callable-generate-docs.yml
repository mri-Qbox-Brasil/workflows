name: Callable — Generate Docs

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: '20'
      ai-provider:
        type: string
        default: ''
      ai-model:
        type: string
        default: ''
      ai-base-url:
        type: string
        default: ''
      ai-chunks:
        type: string
        default: '4'
    secrets:
      GH_TOKEN:
        required: false
      AI_API_KEY:
        required: true

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_TOKEN || github.token }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          registry-url: 'https://npm.pkg.github.com'
          scope: '@mri-qbox-brasil'

      - name: Install fivem-scripts
        run: npm install --no-save @mri-qbox-brasil/fivem-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}

      - name: Generate docs
        run: npx fivem-scripts generate-docs
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_PROVIDER: ${{ inputs.ai-provider }}
          AI_BASE_URL: ${{ inputs.ai-base-url }}
          AI_MODEL: ${{ inputs.ai-model }}
          AI_CHUNKS: ${{ inputs.ai-chunks }}

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md MANUAL.md
          git diff --staged --quiet && echo "No changes." || (git commit -m "docs: regenerate documentation [skip ci]" && git push)

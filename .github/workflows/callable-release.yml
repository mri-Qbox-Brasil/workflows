name: Callable — Release

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: '20'
      # Diretorio do front (onde mora o package.json exibido na UI). Usado tanto
      # pelo set-version (bump do fallback de versao) quanto pelo build. Default
      # "web"; configure no repo chamador quando o front estiver em outro lugar.
      web-path:
        type: string
        default: 'web'
      # Config do Infisical (fonte central de secrets via OIDC). NADA aqui e
      # secret: o Identity ID e so um identificador — a auth exige o JWT OIDC do
      # Actions casar com a trust condition (claim job_workflow_ref) da identity.
      # Por isso os resources chamadores nao precisam guardar secret nenhum.
      infisical-domain:
        type: string
        default: 'https://secrets.mriqbox.com.br'
      infisical-identity:
        type: string
        default: 'efec2ffe-55d0-479d-9535-8da6b0ea4665'
      infisical-project:
        type: string
        default: 'github-releases-k1-qq'
      infisical-env:
        type: string
        default: 'prod'
      # Audience do JWT OIDC. Fixado explicitamente (nao confiar na default da
      # action) e DEVE bater com o campo "Audiences" da identity no Infisical.
      infisical-audience:
        type: string
        default: 'https://github.com/mri-Qbox-Brasil'
    secrets:
      # Agora opcional: com o Infisical o token vem por OIDC. Continua aceito como
      # fallback (secrets: inherit) enquanto a migracao nao termina.
      GH_TOKEN:
        required: false
      # PAT (conta pessoal) com escopo `models` para o GitHub Models. Sem ele,
      # cai no GITHUB_TOKEN (que dá 403 em org free) e usa as notas cruas.
      GH_MODELS_TOKEN:
        required: false
      # Webhook do canal de updates do Discord. Sem ela, o notificador apenas
      # pula — a release continua normalmente.
      UPDATE_DISCORD_WEBHOOK:
        required: false
      # Branding opcional do embed. Cada campo só entra no embed se existir.
      LOGO_MRIQBOX_URL:
        required: false
      RESOURCE_MRIQBOX_URL:
        required: false
      INVITE_DISCORD_URL:
        required: false
      DOCS_MRIQBOX_URL:
        required: false

jobs:
  release:
    # Chave do job: `vars.CI_RELEASE=false` desliga a release neste repositorio.
    # Ver a secao "Chaves liga-desliga" no README.
    if: ${{ !contains(fromJSON('["false","0","off","no"]'), vars.CI_RELEASE) }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      packages: write
      # Necessário para o GitHub Models (geração da descrição via IA).
      models: read
      # OIDC: emite o JWT que o Infisical troca pelos secrets. ATENCAO: por ser
      # reusable workflow, o JOB CHAMADOR (wrapper release.yml do resource) TAMBEM
      # precisa declarar `id-token: write` — senao o token nao e concedido aqui.
      id-token: write

    steps:
      # Diagnostico das chaves: mostra o que este repositorio configurou. Serve
      # para entender de cara por que um passo apareceu como "skipped".
      - name: Chaves (vars) deste repositorio
        env:
          CI_SECRETS_INFISICAL: ${{ vars.CI_SECRETS_INFISICAL }}
          CI_RELEASE_NOTIFY_DISCORD: ${{ vars.CI_RELEASE_NOTIFY_DISCORD }}
        run: |
          echo "CI_RELEASE=<ligado: o job rodou>"
          echo "CI_SECRETS_INFISICAL=${CI_SECRETS_INFISICAL:-<vazio: ligado>}"
          echo "CI_RELEASE_NOTIFY_DISCORD=${CI_RELEASE_NOTIFY_DISCORD:-<vazio: ligado>}"

      # Puxa os secrets do Infisical via OIDC (fonte central). Nao-fatal: se o
      # Infisical estiver fora/instavel, este passo falha mas o workflow segue e
      # cai no fallback `secrets.*` (padrao `env.X || secrets.X`) nos consumidores.
      # Exporta cada secret do projeto/env como variavel de ambiente mascarada.
      #
      # Chave: `vars.CI_SECRETS_INFISICAL=false` pula o Infisical e usa so os
      # secrets nativos do repo/org.
      - name: Secrets via Infisical (OIDC)
        id: infisical
        if: ${{ !contains(fromJSON('["false","0","off","no"]'), vars.CI_SECRETS_INFISICAL) }}
        continue-on-error: true
        uses: Infisical/secrets-action@v1.0.16
        with:
          method: oidc
          domain: ${{ inputs.infisical-domain }}
          identity-id: ${{ inputs.infisical-identity }}
          project-slug: ${{ inputs.infisical-project }}
          env-slug: ${{ inputs.infisical-env }}
          oidc-audience: ${{ inputs.infisical-audience }}

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ env.GH_TOKEN || secrets.GH_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          registry-url: 'https://npm.pkg.github.com'
          scope: '@mri-qbox-brasil'

      # O CLI vem do registry PRIVADO da org (precisa do NODE_AUTH_TOKEN); os
      # pacotes do semantic-release vem do npm publico. Passos separados para que
      # uma falha de auth no registry da org nao se confunda com falha de rede.
      - name: Install CLI @mri-qbox-brasil/workflows
        run: npm install --no-save @mri-qbox-brasil/workflows
        env:
          NODE_AUTH_TOKEN: ${{ env.GH_TOKEN || secrets.GH_TOKEN }}

      - name: Install semantic-release e plugins
        run: |
          npm install --no-save \
            semantic-release \
            @semantic-release/changelog \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator \
            @semantic-release/exec \
            @semantic-release/git \
            @semantic-release/github
        env:
          NODE_AUTH_TOKEN: ${{ env.GH_TOKEN || secrets.GH_TOKEN }}

      # Nome do resource (pasta/zip do build). Resolvido aqui em vez de dentro do
      # prepareCmd do semantic-release, que ficava com um `cut` embutido.
      - name: Resolve o nome do resource
        id: rn
        run: echo "name=${GITHUB_REPOSITORY##*/}" >> "$GITHUB_OUTPUT"

      # Notificador de release para o Discord. O script e FONTE UNICA em
      # `.release/discord-release.js` deste repo, publicado no pacote
      # @mri-qbox-brasil/workflows (ja instalado acima) e exposto como
      # `workflows notify-discord`. Antes vivia como heredoc aqui e numa copia
      # em .release/templates/release-notify.yml — as duas ja tinham divergido.
      #
      # O successCmd do semantic-release dispara APENAS quando uma versao e de
      # fato publicada, e passa so a versao (semver, a prova de shell): o script
      # busca notas e descricao pela API do GitHub, pede ao GitHub Models um
      # resumo amigavel em PT-BR e posta o embed. Nunca derruba a release.
      - name: Gera a config do semantic-release
        run: |
          cat > .release.config.cjs << 'EOF'
          module.exports = {
            branches: ['main'],
            plugins: [
              '@semantic-release/commit-analyzer',
              '@semantic-release/release-notes-generator',
              '@semantic-release/changelog',
              ['@semantic-release/exec', {
                // set-version injeta a versao no placeholder __VERSION__ do
                // fxmanifest e bumpa o package.json do front; build empacota o
                // resource em dist/<name>.zip.
                prepareCmd: "npx workflows set-version ${nextRelease.version} \"$WEB_PATH\" && npx workflows build \"$RESOURCE_NAME\" \"$WEB_PATH\"",
                // Notifica o Discord só quando uma versão é de fato publicada.
                // Passa apenas a versão (semver) — o script busca as notas via API.
                // O `|| true` garante que nem um erro do npx derrube uma release
                // que já foi publicada; o próprio script sempre sai com 0.
                successCmd: "npx workflows notify-discord '${nextRelease.version}' || true"
              }],
              // Commita de volta o bump do package.json do front e o CHANGELOG,
              // para que builds de fonte reflitam a última versão (issue #3).
              // NUNCA inclui fxmanifest.lua aqui: o source mantém __VERSION__.
              ['@semantic-release/git', {
                assets: [(process.env.WEB_PATH || 'web') + '/package.json', 'CHANGELOG.md'],
                message: 'chore(release): ${nextRelease.version} [skip ci]'
              }],
              ['@semantic-release/github', {
                assets: [{ path: 'dist/*.zip', label: 'Download' }],
                labels: []
              }]
            ]
          };
          EOF

      - name: Executa o semantic-release
        run: npx semantic-release --extends ./.release.config.cjs
        env:
          # Padrao `env.X || secrets.X`: usa o valor vindo do Infisical (exportado
          # como env pelo passo OIDC); se ausente (Infisical fora), cai no secret.
          GITHUB_TOKEN: ${{ env.GH_TOKEN || secrets.GH_TOKEN }}
          NODE_AUTH_TOKEN: ${{ env.GH_TOKEN || secrets.GH_TOKEN }}
          # Diretorio do front, consumido pelo set-version, build e git assets.
          WEB_PATH: ${{ inputs.web-path }}
          # Nome do resource, consumido pelo build (pasta e zip em dist/).
          RESOURCE_NAME: ${{ steps.rn.outputs.name }}
          # Token para o GitHub Models (acesso é por identidade da conta, não por
          # escopo). Prefere um PAT dedicado; senão usa o GH_TOKEN (PAT pessoal do
          # release); em último caso o GITHUB_TOKEN (403 em org free -> notas cruas).
          GH_MODELS_TOKEN: ${{ env.GH_MODELS_TOKEN || secrets.GH_MODELS_TOKEN || env.GH_TOKEN || secrets.GH_TOKEN || github.token }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          # Notificação de release no Discord (todas opcionais).
          # Kill switch por repo: a chave CI_RELEASE_NOTIFY_DISCORD (convenção
          # atual) ou a var legada DISCORD_RELEASE_NOTIFY. Como o notificador
          # agora roda dentro do semantic-release, e não num passo próprio, o
          # desligamento é feito aqui — o script trata os dois nomes por esta env.
          DISCORD_RELEASE_NOTIFY: ${{ vars.CI_RELEASE_NOTIFY_DISCORD || vars.DISCORD_RELEASE_NOTIFY }}
          DISCORD_RELEASE_WEBHOOK: ${{ env.UPDATE_DISCORD_WEBHOOK || secrets.UPDATE_DISCORD_WEBHOOK }}
          LOGO_MRIQBOX_URL: ${{ env.LOGO_MRIQBOX_URL || secrets.LOGO_MRIQBOX_URL }}
          RESOURCE_MRIQBOX_URL: ${{ env.RESOURCE_MRIQBOX_URL || secrets.RESOURCE_MRIQBOX_URL }}
          INVITE_DISCORD_URL: ${{ env.INVITE_DISCORD_URL || secrets.INVITE_DISCORD_URL }}
          DOCS_MRIQBOX_URL: ${{ env.DOCS_MRIQBOX_URL || secrets.DOCS_MRIQBOX_URL }}

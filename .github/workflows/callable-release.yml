name: Callable — Release

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: '20'
      # Diretorio do front (onde mora o package.json exibido na UI). Usado tanto
      # pelo set-version (bump do fallback de versao) quanto pelo build. Default
      # "web"; configure no repo chamador quando o front estiver em outro lugar.
      web-path:
        type: string
        default: 'web'
      # Config do Infisical (fonte central de secrets via OIDC). NADA aqui e
      # secret: o Identity ID e so um identificador — a auth exige o JWT OIDC do
      # Actions casar com a trust condition (claim job_workflow_ref) da identity.
      # Por isso os resources chamadores nao precisam guardar secret nenhum.
      infisical-domain:
        type: string
        default: 'https://secrets.mriqbox.com.br'
      infisical-identity:
        type: string
        default: 'efec2ffe-55d0-479d-9535-8da6b0ea4665'
      infisical-project:
        type: string
        default: 'github-releases-k1-qq'
      infisical-env:
        type: string
        default: 'prod'
      # Audience do JWT OIDC. Fixado explicitamente (nao confiar na default da
      # action) e DEVE bater com o campo "Audiences" da identity no Infisical.
      infisical-audience:
        type: string
        default: 'https://github.com/mri-Qbox-Brasil'
    secrets:
      # Agora opcional: com o Infisical o token vem por OIDC. Continua aceito como
      # fallback (secrets: inherit) enquanto a migracao nao termina.
      GH_TOKEN:
        required: false
      # PAT (conta pessoal) com escopo `models` para o GitHub Models. Sem ele,
      # cai no GITHUB_TOKEN (que dá 403 em org free) e usa as notas cruas.
      GH_MODELS_TOKEN:
        required: false
      # Webhook do canal de updates do Discord. Sem ela, o notificador apenas
      # pula — a release continua normalmente.
      UPDATE_DISCORD_WEBHOOK:
        required: false
      # Branding opcional do embed. Cada campo só entra no embed se existir.
      LOGO_MRIQBOX_URL:
        required: false
      RESOURCE_MRIQBOX_URL:
        required: false
      INVITE_DISCORD_URL:
        required: false
      DOCS_MRIQBOX_URL:
        required: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      packages: write
      # Necessário para o GitHub Models (geração da descrição via IA).
      models: read
      # OIDC: emite o JWT que o Infisical troca pelos secrets. ATENCAO: por ser
      # reusable workflow, o JOB CHAMADOR (wrapper release.yml do resource) TAMBEM
      # precisa declarar `id-token: write` — senao o token nao e concedido aqui.
      id-token: write

    steps:
      # Puxa os secrets do Infisical via OIDC (fonte central). Nao-fatal: se o
      # Infisical estiver fora/instavel, este passo falha mas o workflow segue e
      # cai no fallback `secrets.*` (padrao `env.X || secrets.X`) nos consumidores.
      # Exporta cada secret do projeto/env como variavel de ambiente mascarada.
      - name: Secrets via Infisical (OIDC)
        id: infisical
        continue-on-error: true
        uses: Infisical/secrets-action@v1.0.16
        with:
          method: oidc
          domain: ${{ inputs.infisical-domain }}
          identity-id: ${{ inputs.infisical-identity }}
          project-slug: ${{ inputs.infisical-project }}
          env-slug: ${{ inputs.infisical-env }}
          oidc-audience: ${{ inputs.infisical-audience }}

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ env.GH_TOKEN || secrets.GH_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          registry-url: 'https://npm.pkg.github.com'
          scope: '@mri-qbox-brasil'

      # O CLI vem do registry PRIVADO da org (precisa do NODE_AUTH_TOKEN); os
      # pacotes do semantic-release vem do npm publico. Passos separados para que
      # uma falha de auth no registry da org nao se confunda com falha de rede.
      - name: Install CLI @mri-qbox-brasil/workflows
        run: npm install --no-save @mri-qbox-brasil/workflows
        env:
          NODE_AUTH_TOKEN: ${{ env.GH_TOKEN || secrets.GH_TOKEN }}

      - name: Install semantic-release e plugins
        run: |
          npm install --no-save \
            semantic-release \
            @semantic-release/changelog \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator \
            @semantic-release/exec \
            @semantic-release/git \
            @semantic-release/github
        env:
          NODE_AUTH_TOKEN: ${{ env.GH_TOKEN || secrets.GH_TOKEN }}

      # Nome do resource (pasta/zip do build). Resolvido aqui em vez de dentro do
      # prepareCmd do semantic-release, que ficava com um `cut` embutido.
      - name: Resolve o nome do resource
        id: rn
        run: echo "name=${GITHUB_REPOSITORY##*/}" >> "$GITHUB_OUTPUT"

      # Notificador de release para o Discord. Fica inline (não num arquivo do
      # repo) porque a callable roda no checkout do resource chamador, não deste
      # repositório de workflows.
      #
      # Fluxo: o successCmd do semantic-release dispara APENAS quando uma versão
      # é de fato publicada e passa só a versão (semver, à prova de shell). O
      # script busca as notas e a descrição via API do GitHub (evita a
      # fragilidade de interpolar markdown no shell), pede ao GitHub Models um
      # resumo amigável em PT-BR e posta o embed. Nunca derruba a release.
      - name: Prepara notificador de release
        run: |
          mkdir -p .ci
          cat > .ci/discord-release.js << 'EOF'
          'use strict';

          // ── Configuração via env ────────────────────────────────────────────
          const webhook = process.env.DISCORD_RELEASE_WEBHOOK;
          const apiToken = process.env.GITHUB_TOKEN || process.env.GH_TOKEN;
          const modelsToken = process.env.GH_MODELS_TOKEN || apiToken;
          const model = (process.env.LLM_MODEL || '').trim() || 'openai/gpt-4o-mini';
          const repo = process.env.GITHUB_REPOSITORY;            // ex: mri-Qbox-Brasil/mri_Qadmin
          const author = process.env.GITHUB_ACTOR || '';
          const env = (k) => (process.env[k] || '').trim();

          const version = (process.argv[2] || '').replace(/^v/, '');

          // Kill switch por repo: defina a variável DISCORD_RELEASE_NOTIFY=false
          // (Settings → Variables) para desligar a notificação. Ligado por padrão.
          const notify = env('DISCORD_RELEASE_NOTIFY').toLowerCase();
          if (['false', '0', 'off', 'no'].includes(notify)) { console.log('[discord] DISCORD_RELEASE_NOTIFY desligado, pulando.'); process.exit(0); }
          if (!webhook) { console.log('[discord] sem DISCORD_RELEASE_WEBHOOK, pulando.'); process.exit(0); }
          if (!repo || !version) { console.log('[discord] repo/versão ausentes, pulando.'); process.exit(0); }

          const name = repo.split('/')[1];
          const tag = `v${version}`;
          const releaseUrl = `https://github.com/${repo}/releases/tag/${tag}`;
          const FIELD_MAX = 1000; // limite de field do embed é 1024; folga de segurança.

          async function ghJson(path) {
            const res = await fetch(`https://api.github.com${path}`, {
              headers: {
                Accept: 'application/vnd.github+json',
                'User-Agent': 'mri-release-notifier',
                ...(apiToken ? { Authorization: `Bearer ${apiToken}` } : {}),
              },
            });
            if (!res.ok) throw new Error(`GitHub API ${path} -> ${res.status}`);
            return res.json();
          }

          // Reescreve o changelog técnico como um resumo curto e amigável em PT-BR.
          // Em qualquer falha, cai para as notas cruas (truncadas).
          async function aiSummary(rawNotes) {
            const fallback = (rawNotes || 'Nova versão publicada.').slice(0, FIELD_MAX);
            if (!modelsToken || !rawNotes) return fallback;
            try {
              const res = await fetch('https://models.github.ai/inference/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${modelsToken}` },
                body: JSON.stringify({
                  model,
                  temperature: 0.5,
                  messages: [
                    {
                      role: 'system',
                      content:
                        'Você é o redator de notas de versão do MRI QBOX, um conjunto de resources ' +
                        'para servidores FiveM (framework QBox). Recebe um changelog técnico gerado ' +
                        'por conventional commits e o reescreve como um resumo curto, claro e amigável ' +
                        'em português do Brasil, voltado para donos de servidor e jogadores. Regras: ' +
                        'use no máximo 5 bullets em markdown (use "- "); foque no que muda na prática; ' +
                        'não invente recursos que não estão no changelog; não inclua links, hashes de ' +
                        'commit nem nomes de autores; máximo ~800 caracteres; se não houver mudanças ' +
                        'relevantes para o usuário, escreva uma única linha de melhorias internas.',
                    },
                    { role: 'user', content: `Changelog técnico da ${tag}:\n\n${rawNotes}` },
                  ],
                }),
              });
              if (!res.ok) throw new Error(`GitHub Models ${res.status}`);
              const data = await res.json();
              const text = data.choices?.[0]?.message?.content?.trim();
              if (!text) throw new Error('resposta vazia do modelo');
              console.log('[discord] descrição gerada via IA.');
              return text.slice(0, FIELD_MAX);
            } catch (e) {
              console.error('[discord] IA falhou, usando notas cruas:', e.message);
              return fallback;
            }
          }

          (async () => {
            let rawNotes = '';
            let description = '';
            try {
              const rel = await ghJson(`/repos/${repo}/releases/tags/${tag}`);
              rawNotes = rel.body || '';
            } catch (e) { console.error('[discord] não obteve notas da release:', e.message); }
            try {
              const info = await ghJson(`/repos/${repo}`);
              description = info.description || '';
            } catch (e) { console.error('[discord] não obteve descrição do repo:', e.message); }

            const whatsNew = await aiSummary(rawNotes);

            // Campos de branding entram só quando a secret correspondente existe.
            const fields = [{ name: 'O que há de novo?', value: whatsNew }];
            fields.push({
              name: 'Veja todas as mudanças',
              value: `[Veja aqui](https://github.com/${repo}/commits/${tag})`,
            });
            if (env('INVITE_DISCORD_URL'))
              fields.push({ name: 'Precisa de ajuda?', value: `[Participe da comunidade](${env('INVITE_DISCORD_URL')})`, inline: true });
            if (env('DOCS_MRIQBOX_URL'))
              fields.push({ name: 'Documentação', value: `[Acesse aqui](${env('DOCS_MRIQBOX_URL')})`, inline: true });

            const embed = {
              author: { name: 'MRI QBOX - Updates', ...(env('LOGO_MRIQBOX_URL') ? { icon_url: env('LOGO_MRIQBOX_URL') } : {}) },
              title: `[${name}] Nova versão disponível: ${tag}`.slice(0, 256),
              url: releaseUrl,
              description: description.slice(0, 4096),
              fields,
              color: 4243543,
              footer: { text: `Realizado por: ${author}`.slice(0, 2048), ...(env('LOGO_MRIQBOX_URL') ? { icon_url: env('LOGO_MRIQBOX_URL') } : {}) },
              timestamp: new Date().toISOString(),
            };
            if (env('RESOURCE_MRIQBOX_URL')) embed.image = { url: env('RESOURCE_MRIQBOX_URL') };

            const res = await fetch(webhook, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ embeds: [embed] }),
            });
            console.log('[discord] status', res.status);
            if (!res.ok) console.error('[discord] corpo:', (await res.text()).slice(0, 500));
          })().catch((e) => { console.error('[discord] erro não fatal:', e.message); process.exit(0); });
          EOF

      - name: Gera a config do semantic-release
        run: |
          cat > .release.config.cjs << 'EOF'
          module.exports = {
            branches: ['main'],
            plugins: [
              '@semantic-release/commit-analyzer',
              '@semantic-release/release-notes-generator',
              '@semantic-release/changelog',
              ['@semantic-release/exec', {
                // set-version injeta a versao no placeholder __VERSION__ do
                // fxmanifest e bumpa o package.json do front; build empacota o
                // resource em dist/<name>.zip.
                prepareCmd: "npx workflows set-version ${nextRelease.version} \"$WEB_PATH\" && npx workflows build \"$RESOURCE_NAME\" \"$WEB_PATH\"",
                // Notifica o Discord só quando uma versão é de fato publicada.
                // Passa apenas a versão (semver) — o script busca as notas via API.
                successCmd: "node .ci/discord-release.js '${nextRelease.version}'"
              }],
              // Commita de volta o bump do package.json do front e o CHANGELOG,
              // para que builds de fonte reflitam a última versão (issue #3).
              // NUNCA inclui fxmanifest.lua aqui: o source mantém __VERSION__.
              ['@semantic-release/git', {
                assets: [(process.env.WEB_PATH || 'web') + '/package.json', 'CHANGELOG.md'],
                message: 'chore(release): ${nextRelease.version} [skip ci]'
              }],
              ['@semantic-release/github', {
                assets: [{ path: 'dist/*.zip', label: 'Download' }],
                labels: []
              }]
            ]
          };
          EOF

      - name: Executa o semantic-release
        run: npx semantic-release --extends ./.release.config.cjs
        env:
          # Padrao `env.X || secrets.X`: usa o valor vindo do Infisical (exportado
          # como env pelo passo OIDC); se ausente (Infisical fora), cai no secret.
          GITHUB_TOKEN: ${{ env.GH_TOKEN || secrets.GH_TOKEN }}
          NODE_AUTH_TOKEN: ${{ env.GH_TOKEN || secrets.GH_TOKEN }}
          # Diretorio do front, consumido pelo set-version, build e git assets.
          WEB_PATH: ${{ inputs.web-path }}
          # Nome do resource, consumido pelo build (pasta e zip em dist/).
          RESOURCE_NAME: ${{ steps.rn.outputs.name }}
          # Token para o GitHub Models (acesso é por identidade da conta, não por
          # escopo). Prefere um PAT dedicado; senão usa o GH_TOKEN (PAT pessoal do
          # release); em último caso o GITHUB_TOKEN (403 em org free -> notas cruas).
          GH_MODELS_TOKEN: ${{ env.GH_MODELS_TOKEN || secrets.GH_MODELS_TOKEN || env.GH_TOKEN || secrets.GH_TOKEN || github.token }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          # Notificação de release no Discord (todas opcionais).
          # Kill switch por repo: var DISCORD_RELEASE_NOTIFY=false desliga.
          DISCORD_RELEASE_NOTIFY: ${{ vars.DISCORD_RELEASE_NOTIFY }}
          DISCORD_RELEASE_WEBHOOK: ${{ env.UPDATE_DISCORD_WEBHOOK || secrets.UPDATE_DISCORD_WEBHOOK }}
          LOGO_MRIQBOX_URL: ${{ env.LOGO_MRIQBOX_URL || secrets.LOGO_MRIQBOX_URL }}
          RESOURCE_MRIQBOX_URL: ${{ env.RESOURCE_MRIQBOX_URL || secrets.RESOURCE_MRIQBOX_URL }}
          INVITE_DISCORD_URL: ${{ env.INVITE_DISCORD_URL || secrets.INVITE_DISCORD_URL }}
          DOCS_MRIQBOX_URL: ${{ env.DOCS_MRIQBOX_URL || secrets.DOCS_MRIQBOX_URL }}
